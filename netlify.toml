[build]
  command = "npm run build"
  publish = "dist"

# Production: only when `main` changes (Publish All merge)
[context.production]
  command = "npm run build"

# Deploy Preview: only when a PR is opened (Preview All button)
[context.deploy-preview]
  command = "npm run build"

# Do NOT auto-build the `cms` branch on every Save Draft
# (avoids burning credits while editing many projects)
[context.branch-deploy]
  ignore = "exit 0"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
