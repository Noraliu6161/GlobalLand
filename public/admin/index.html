<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Land CMS</title>
    <link rel="stylesheet" href="./admin.css?v=10" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
    <script src="./publish-all.js?v=10"></script>
    <script>
      ;(function () {
        if (!window.netlifyIdentity) return

        function openFromHash() {
          var hash = window.location.hash || ''
          if (hash.indexOf('invite_token=') !== -1) {
            window.netlifyIdentity.open('signup')
            return
          }
          if (hash.indexOf('recovery_token=') !== -1) {
            window.netlifyIdentity.open('recovery')
          }
        }

        window.netlifyIdentity.on('init', function (user) {
          openFromHash()
          if (!user) {
            window.netlifyIdentity.on('login', function () {
              document.location.href = '/admin/'
            })
          }
        })

        window.addEventListener('hashchange', openFromHash)
      })()
    </script>
  </body>
</html>
